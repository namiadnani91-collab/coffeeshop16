<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Coffee Corner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>Coffee Corner</h1>
    <p>Your neighbourhood coffee shop — order online.</p>
    <button id="view-cart" class="cart-btn">Cart (<span id="cart-count">0</span>)</button>
  </header>

  <main class="container">
    <section class="menu" id="menu">
      <h2>Menu</h2>
      <div id="items" class="items-grid"></div>
    </section>
  </main>

  <div id="cart-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-cart" class="close">×</button>
      <h2>Your Order</h2>
      <ul id="cart-items" class="cart-list"></ul>
      <div class="cart-footer">
        <div class="total">Total: ₹<span id="cart-total">0</span></div>
        <button id="checkout" class="primary">Checkout</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
